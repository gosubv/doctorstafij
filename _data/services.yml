- title: "🥗 Консультация эндокринолога-нутрициолога (комплексный подход)"
  text: "<p><b>Подойдёт вам, если:</b></p><ul class='list-symbol'><li>хотите разобрать анализы в целом</li><li>есть усталость, нарущения сна, набор веса, дефициты</li><li>важно питание + гормоны + обмен веществ</li><li>нужен индивидуальный план восстановления организма</li><li>есть хронические состояния и нужна поддержка</li></ul><div class='service-grid'><div><p><b>Что входит:</b></p><ul class='list-bullet'><li>подробный разбор всех анализов по оптимумам (превентивным нормам), а не только по референсам</li><li>оценка витаминов, микроэлементов, биохимии и составление схемы их восполнения</li><li>анализ питания и образа жизни, подбор лечебного протокола</li><li>оценка процессов пищеварения и всасывания нутриентов</li><li>выявление дефицитов</li><li>составление персональной схемы коррекции</li><li>рекомендации по питанию и поддержке гормонального баланса, коррекция рациона под ваши цели</li><li>рекомендации по гигиене сна, физической активности и стресс-менеджменту</li><li>при необходимости направление на УЗИ органов брюшной полости и копрограмму — исследование, позволяющее оценить переваривание пищи и работу ЖКТ</li></ul></div><div class='important-box'><p>📌 Это расширенная консультация с глубокой проработкой причин. Все данные рассматриваются в комплексе с клиническими симптомами и лабораторными анализами. Мой подход — индивидуальный, бережный и медицински обоснованный, с фокусом на причины, а не только на симптомы.</p></div></div>"
  duration: "<div class='meta-box'><div class='meta-icon'>⏳</div><div class='meta-content'><span class='meta-label'>Длительность: </span><span class='meta-value'>50–60 минут</span></div></div>"
