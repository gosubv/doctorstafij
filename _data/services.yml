- title: "🩺 Консультация врача-эндокринолога"
  text: "<p><b>Подойдёт вам, если:</b></p><ul class='list-symbol'><li>есть жалобы, связанные с гормонами</li><li>есть диагноз (диабет, щитовидная железа, нарушения цикла и др.)</li><li>нужно подобрать или скорректировать лечение</li><li>требуется медицинское сопровождение</li></ul><div class='service-grid'><div><p><b>Что входит:</b></p><ul class='list-bullet'><li>сбор жалоб и анамнеза (истории заболевания), пальпация щитовидной железы и лимфоузлов, измерение артериального давления, веса и расчет ИМТ</li><li>оценка гормонального статуса</li><li>постановка предварительного диагноза и назначение обследований</li><li>составление плана лечения</li><li>рекомендации по наблюдению до получения результатов анализов</li></ul></div><div class='important-box'><p><b>Важно:</b></p><p>На этом приёме не проводится подробный разбор: витаминов, ферритина, холестерина, биохимии, дефицитов.</p></div></div>"
  duration: "<div class='meta-box'><div class='meta-icon'>⏳</div><div class='meta-content'><span class='meta-label'>Длительность: </span><span class='meta-value'>30 минут</span></div></div>"
  price: "<div class='meta-box highlight'><div class='meta-icon'>💰</div><div class='meta-content'><span class='meta-label'>Стоимость приема </span><span class='meta-value price-main'>10 000 ₸</span></div></div>"
  price_online: "<div class='meta-box'><div class='meta-icon'>📱</div><div class='meta-content'><span class='meta-label'>Онлайн консультация </span><span class='meta-desc'>(звонок Whatsapp или по телефону): </span><span class='meta-value'>10 000 ₸</span></div></div>"
  price_repeating: "<div class='meta-box'><div class='meta-icon'>🔄</div><div class='meta-content'><span class='meta-label'>Повторная консультация: </span><span class='meta-desc'>(в течении 1 месяца после первичного приема): </span><span class='meta-value'>10 000 ₸</span><ul><li>подробная расшифровка лабораторных и инструментальных исследований простым языком</li><li>постановка окончательного клинического диагноза</li><li>назначение медикаментозной терапии (при необходимости)</li><li>ответы на вопросы и определение тактики дальнейшего наблюдения</li></ul></div></div>"
